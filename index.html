<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>VIC - VTuber Introduction Center -</title>
  <meta name="description" content="おすすめ動画を通してVTuberの魅力と新しい出会いを届ける紹介サイト">
  <link rel="stylesheet" href="styles.css?v=20260721-vic-admin1">
</head>
<body class="home">
  <header class="hero">
    <div class="wrap">
      <p class="eyebrow">Discover Your Next Favorite VTuber</p>
      <h1>VIC</h1>
      <p class="subtitle">VTuber Introduction Center</p>
    </div>
  </header>

  <main class="wrap home-main">
    <aside id="dailyRecommendation" class="daily-recommendation" aria-labelledby="dailyRecommendationLabel" hidden>
      <div class="daily-recommendation-heading">
        <p id="dailyRecommendationLabel" class="daily-recommendation-label">
          <span class="daily-recommendation-spark" aria-hidden="true">✦</span>
          本日のおすすめVTuber
        </p>
        <time id="dailyRecommendationDate" class="daily-recommendation-date"></time>
      </div>

      <a id="dailyRecommendationLink" class="daily-recommendation-card" href="#" target="_blank" rel="noopener noreferrer">
        <span class="daily-recommendation-seal" aria-hidden="true"><span>VIC</span></span>
        <span class="daily-recommendation-copy">
          <span class="daily-recommendation-kicker">Today’s VIC Pick</span>
          <strong id="dailyRecommendationName">おすすめVTuberを読み込んでいます</strong>
          <span id="dailyRecommendationMeta"></span>
          <span id="dailyRecommendationPoint" class="daily-recommendation-point"></span>
          <span class="daily-recommendation-action">おすすめ動画を見る</span>
        </span>
        <span class="daily-recommendation-media" aria-hidden="true">
          <img id="dailyRecommendationThumbnail" src="" alt="">
          <span class="daily-recommendation-play">▶</span>
        </span>
      </a>
      <p id="dailyRecommendationStatus" class="status-message" aria-live="polite"></p>
    </aside>

    <section class="home-intro">
      <p class="eyebrow">Community Recommendation</p>
      <div>
        <h2 class="intro-title"><span>魅力を</span><span class="intro-title-line" aria-hidden="true"></span><span>みんなへ。</span></h2>
        <p class="lead">あなたのおすすめから、新しい推しとの出会いが始まります。</p>
        <a class="text-link" href="register.html">おすすめを登録する<span aria-hidden="true">↗</span></a>
      </div>
    </section>
  </main>

  <footer><div class="wrap">VIC - VTuber Introduction Center -</div></footer>

  <audio id="bgmAudio" src="Stream.mp3" loop preload="metadata"></audio>
  <button id="bgmToggle" class="floating-control bgm-toggle" type="button" aria-pressed="false">BGMを再生</button>

  <script src="config.js"></script>
  <script src="app.js?v=20260721-vic-admin1"></script>
</body>
</html>
