<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>VIC - VTuber Introduction Center -</title>
  <meta name="description" content="おすすめ動画を通してVTuberの魅力と新しい出会いを届ける紹介サイト">
  <link rel="stylesheet" href="styles.css?v=20260721-vic-genre10">
</head>
<body class="home">
  <header class="hero">
    <div class="wrap">
      <p class="eyebrow">Discover Your Next Favorite VTuber</p>
      <h1>VIC</h1>
      <p class="subtitle">VTuber Introduction Center</p>
    </div>
  </header>

  <main class="wrap home-main">
    <section class="home-intro">
      <p class="eyebrow">Community Recommendation</p>
      <div>
        <h2 class="intro-title"><span>魅力を</span><span class="intro-title-line" aria-hidden="true"></span><span>みんなへ。</span></h2>
        <p class="lead">あなたのおすすめから、新しい推しとの出会いが始まります。</p>
        <a class="text-link" href="register.html">おすすめを登録する<span aria-hidden="true">↗</span></a>
      </div>
    </section>

    <section id="recommendationSection" class="recommendation-section" aria-labelledby="recommendationTitle">
      <div class="recommendation-section-head">
        <div>
          <p class="eyebrow">Random Recommendation</p>
          <h2 id="recommendationTitle">ジャンルから、<br>おすすめを探す。</h2>
          <p class="recommendation-description">選んだジャンルの公開動画から、ランダムで最大10件を表示します。</p>
        </div>
        <div class="recommendation-controls">
          <label for="recommendationGenre">表示するジャンル
            <select id="recommendationGenre">
              <option value="">すべてのジャンル</option>
              <option value="雑談">雑談</option>
              <option value="歌枠">歌枠</option>
              <option value="ゲーム実況">ゲーム実況</option>
              <option value="お絵描き">お絵描き</option>
              <option value="ASMR">ASMR</option>
              <option value="料理">料理</option>
              <option value="開封">開封</option>
              <option value="旅行・旅">旅行・旅</option>
              <option value="作業">作業</option>
              <option value="企画">企画</option>
              <option value="耐久">耐久</option>
              <option value="コラボ">コラボ</option>
              <option value="案件">案件</option>
              <option value="ニュース">ニュース</option>
              <option value="読書・朗読">読書・朗読</option>
              <option value="その他">その他</option>
            </select>
          </label>
          <button id="recommendationShuffle" class="recommendation-shuffle" type="button">このジャンルで表示</button>
        </div>
      </div>

      <div id="recommendationList" class="daily-recommendation-list recommendation-list" aria-live="polite">
        <p class="status-message">おすすめVTuberを読み込んでいます。</p>
      </div>
      <p id="recommendationStatus" class="status-message" aria-live="polite"></p>
    </section>
  </main>

  <footer><div class="wrap">VIC - VTuber Introduction Center -</div></footer>

  <audio id="bgmAudio" src="Stream.mp3" loop preload="auto" autoplay></audio>
  <button id="bgmToggle" class="floating-control bgm-toggle" type="button" aria-pressed="false">BGMを再生</button>

  <script src="config.js"></script>
  <script src="app.js?v=20260721-vic-genre10-bgm1"></script>
</body>
</html>
