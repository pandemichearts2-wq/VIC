<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>おすすめ登録 | VIC</title>
  <meta name="description" content="VICへVTuberとおすすめ動画を登録するページ">
  <link rel="stylesheet" href="styles.css?v=20260721-vic-genre10">
</head>
<body class="register-page">
  <header class="hero register-hero">
    <div class="wrap">
      <p class="eyebrow">VTuber Recommendation</p>
      <h1>推しの魅力を、<br>みんなへ届ける。</h1>
      <p class="subtitle">おすすめの一本から、新しい出会いを</p>
    </div>
  </header>

  <main class="wrap register-main">
    <nav class="back-nav" aria-label="トップページへ戻る">
      <a class="text-link" href="index.html">VICへ戻る<span aria-hidden="true">↗</span></a>
    </nav>

    <section class="registration-content">
      <p class="eyebrow">Registration Form</p>
      <h2>おすすめを登録する</h2>
      <p class="registration-copy">初めて登録する場合と、登録済みVTuberへおすすめを追加する場合を選んでください。送信内容は確認後に公開されます。</p>

      <div class="tabs" role="tablist" aria-label="登録方法">
        <button id="initialTab" class="tab active" type="button" role="tab" aria-selected="true" aria-controls="initialPanel">初回登録</button>
        <button id="additionTab" class="tab" type="button" role="tab" aria-selected="false" aria-controls="additionPanel">おすすめを追加</button>
      </div>

      <section id="initialPanel" class="form-panel" role="tabpanel" aria-labelledby="initialTab">
        <form id="initialForm" class="recommendation-form" novalidate>
          <div class="form-grid">
            <label>活動名
              <input name="activityName" type="text" maxlength="100" required>
            </label>
            <label>活動名（よみかた）
              <input name="reading" type="text" maxlength="100" required>
            </label>
            <label>個人 or 企業名
              <input name="affiliation" type="text" maxlength="120" required>
            </label>
            <label>X（旧Twitter）のリンク
              <input name="xUrl" type="url" inputmode="url" placeholder="https://x.com/..." required>
            </label>
            <label>YouTubeチャンネルのリンク
              <input name="youtubeUrl" type="url" inputmode="url" placeholder="https://www.youtube.com/@..." required>
            </label>
            <label>動画ジャンル
              <select name="genre" required>
                <option value="">選択してください</option>
                <option value="雑談">雑談</option>
                <option value="歌枠">歌枠</option>
                <option value="ゲーム実況">ゲーム実況</option>
                <option value="お絵描き">お絵描き</option>
                <option value="ASMR">ASMR</option>
                <option value="料理">料理</option>
                <option value="開封">開封</option>
                <option value="旅行・旅">旅行・旅</option>
                <option value="作業">作業</option>
                <option value="企画">企画</option>
                <option value="耐久">耐久</option>
                <option value="コラボ">コラボ</option>
                <option value="案件">案件</option>
                <option value="ニュース">ニュース</option>
                <option value="読書・朗読">読書・朗読</option>
                <option value="その他">その他</option>
              </select>
            </label>
            <label>おすすめ動画リンク
              <input name="recommendedVideoUrl" type="url" inputmode="url" placeholder="https://www.youtube.com/watch?v=..." required>
            </label>
            <label class="wide">おすすめポイント
              <textarea name="recommendationPoint" rows="5" maxlength="800" placeholder="この動画の好きなところや、見てほしい場面を入力してください" required></textarea>
            </label>
          </div>
          <button class="submit-button" type="submit">初回登録を送信する</button>
          <p class="form-message" aria-live="polite"></p>
        </form>
      </section>

      <section id="additionPanel" class="form-panel" role="tabpanel" aria-labelledby="additionTab" hidden>
        <form id="additionForm" class="recommendation-form" novalidate>
          <div class="profile-picker wide">
            <label for="profileSearchInput">登録済みVTuberを選択</label>
            <input id="profileSearchInput" type="search" autocomplete="off" placeholder="活動名・よみかた・個人／企業名で検索">
            <p id="profileSearchStatus" class="profile-search-status" aria-live="polite">名前を入力すると候補を表示します。</p>
            <div id="profileSearchResults" class="profile-search-results" role="listbox" hidden></div>
            <div id="selectedProfile" class="selected-profile" hidden></div>
            <input id="additionProfileId" name="profileId" type="hidden">
            <input id="additionActivityName" name="activityName" type="hidden">
          </div>
          <div class="form-grid addition-grid">
            <label>動画ジャンル
              <select name="genre" required>
                <option value="">選択してください</option>
                <option value="雑談">雑談</option>
                <option value="歌枠">歌枠</option>
                <option value="ゲーム実況">ゲーム実況</option>
                <option value="お絵描き">お絵描き</option>
                <option value="ASMR">ASMR</option>
                <option value="料理">料理</option>
                <option value="開封">開封</option>
                <option value="旅行・旅">旅行・旅</option>
                <option value="作業">作業</option>
                <option value="企画">企画</option>
                <option value="耐久">耐久</option>
                <option value="コラボ">コラボ</option>
                <option value="案件">案件</option>
                <option value="ニュース">ニュース</option>
                <option value="読書・朗読">読書・朗読</option>
                <option value="その他">その他</option>
              </select>
            </label>
            <label>おすすめ動画リンク
              <input name="recommendedVideoUrl" type="url" inputmode="url" placeholder="https://www.youtube.com/watch?v=..." required>
            </label>
            <label class="wide">おすすめポイント
              <textarea name="recommendationPoint" rows="5" maxlength="800" placeholder="この動画の好きなところや、見てほしい場面を入力してください" required></textarea>
            </label>
          </div>
          <button class="submit-button" type="submit">おすすめを追加申請する</button>
          <p class="form-message" aria-live="polite"></p>
        </form>
      </section>
    </section>
  </main>

  <footer><div class="wrap">VIC - VTuber Introduction Center -</div></footer>

  <audio id="bgmAudio" src="Stream.mp3" loop preload="auto" autoplay></audio>
  <button id="bgmToggle" class="floating-control bgm-toggle" type="button" aria-pressed="false">BGMを再生</button>

  <script src="config.js"></script>
  <script src="register.js?v=20260721-vic-genre10-bgm1"></script>
</body>
</html>
