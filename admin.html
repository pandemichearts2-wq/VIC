<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>VIC 管理画面</title>
  <meta name="description" content="VIC管理者専用ページ">
  <link rel="stylesheet" href="styles.css?v=20260722-vic-public-edit2">
</head>
<body class="admin-page">
  <header class="admin-hero">
    <div class="wrap">
      <p class="eyebrow">Private Management</p>
      <h1>VIC<br><span>Management</span></h1>
      <p>VTuber Introduction Center 管理者専用</p>
    </div>
  </header>

  <main class="wrap admin-main">
    <section id="adminLogin" class="admin-login-card">
      <p class="eyebrow">Administrator Login</p>
      <h2>管理画面へログイン</h2>
      <p>スプレッドシートのVICメニューで設定した管理パスワードを入力してください。</p>
      <form id="adminLoginForm" class="admin-login-form">
        <label for="adminPassword">管理パスワード</label>
        <input id="adminPassword" type="password" autocomplete="current-password" minlength="8" required>
        <button class="admin-button primary" type="submit">ログイン</button>
        <p id="adminLoginMessage" class="admin-status" role="status"></p>
      </form>
    </section>

    <section id="adminShell" class="admin-shell" hidden>
      <div class="admin-topbar">
        <div>
          <p class="eyebrow">Administration</p>
          <h2>管理メニュー</h2>
        </div>
        <button id="adminLogout" class="admin-button secondary" type="button">ログアウト</button>
      </div>

      <nav class="admin-tabs" aria-label="管理項目">
        <button class="admin-tab active" type="button" data-admin-tab="submissions">
          <span>申請管理</span>
          <span id="submissionNotificationBadge" class="admin-notification-badge admin-notification-badge-submission" aria-label="確認待ちの申請件数" hidden>0</span>
        </button>
        <button class="admin-tab" type="button" data-admin-tab="feedback">
          <span>お問い合わせ管理</span>
          <span id="feedbackNotificationGroup" class="admin-notification-group" aria-label="お問い合わせ件数" hidden>
            <span id="feedbackUnconfirmedBadge" class="admin-notification-badge admin-notification-badge-unconfirmed" aria-label="未確認のお問い合わせ件数" title="未確認" hidden><span class="admin-notification-mark" aria-hidden="true">未</span><span data-badge-count>0</span></span>
            <span id="feedbackInProgressBadge" class="admin-notification-badge admin-notification-badge-progress" aria-label="対応中のお問い合わせ件数" title="対応中" hidden><span class="admin-notification-mark" aria-hidden="true">中</span><span data-badge-count>0</span></span>
          </span>
        </button>
        <button class="admin-tab" type="button" data-admin-tab="profiles"><span>公開VTuber編集</span></button>
        <button id="adminPageRefresh" class="admin-button secondary admin-page-refresh" type="button" aria-label="管理画面を更新">更新</button>
      </nav>

      <section id="adminPanelSubmissions" class="admin-panel">
        <div class="admin-toolbar admin-toolbar-submissions">
          <input id="submissionQuery" type="search" placeholder="活動名・申請IDで検索">
          <select id="submissionType">
            <option value="">すべての種類</option>
            <option value="initial">初回登録</option>
            <option value="recommendation">おすすめ追加</option>
          </select>
          <select id="submissionStatus">
            <option value="確認待ち">確認待ち</option>
            <option value="">すべての状態</option>
            <option value="許可（掲載）">許可（掲載）</option>
            <option value="非許可（掲載不可）">非許可（掲載不可）</option>
          </select>
          <button id="submissionSearch" class="admin-button primary" type="button">検索</button>
        </div>
        <div class="admin-bulk-toolbar" aria-label="申請の一括操作">
          <div class="admin-bulk-selection">
            <button id="submissionSelectAll" class="admin-button secondary" type="button">一括チェック</button>
            <button id="submissionClearAll" class="admin-button secondary" type="button">一括チェック解除</button>
            <span id="submissionSelectedCount" class="admin-bulk-count" aria-live="polite">0件選択</span>
          </div>
          <div class="admin-bulk-actions">
            <button id="submissionBulkApprove" class="admin-button primary" type="button" disabled>選択した申請を一括承認</button>
            <button id="submissionBulkDelete" class="admin-button danger" type="button" disabled>選択した申請を一括削除</button>
          </div>
        </div>
        <div id="submissionList" class="admin-list"></div>
        <button id="submissionMore" class="admin-button secondary admin-more" type="button" hidden>さらに表示</button>
      </section>


      <section id="adminPanelFeedback" class="admin-panel" hidden>
        <div class="admin-toolbar admin-toolbar-feedback">
          <input id="feedbackAdminQuery" type="search" placeholder="内容・VTuber名・お問い合わせIDで検索">
          <select id="feedbackAdminStatus">
            <option value="未確認">未確認</option>
            <option value="">すべての状態</option>
            <option value="対応中">対応中</option>
            <option value="対応済み">対応済み</option>
            <option value="対応不要">対応不要</option>
          </select>
          <button id="feedbackAdminSearch" class="admin-button primary" type="button">検索</button>
        </div>
        <div id="feedbackAdminList" class="admin-list"></div>
        <button id="feedbackAdminMore" class="admin-button secondary admin-more" type="button" hidden>さらに表示</button>
      </section>

      <section id="adminPanelProfiles" class="admin-panel" hidden>
        <div class="admin-toolbar">
          <input id="profileAdminQuery" type="search" placeholder="活動名・よみかた・企業名・おすすめ内容で検索">
          <button id="profileAdminSearch" class="admin-button primary" type="button">検索</button>
        </div>
        <div id="profileAdminList" class="admin-list"></div>
        <button id="profileAdminMore" class="admin-button secondary admin-more" type="button" hidden>さらに表示</button>
      </section>

    </section>
  </main>

  <dialog id="adminEditDialog" class="admin-dialog">
    <form id="adminEditForm" method="dialog">
      <div class="admin-dialog-head">
        <div>
          <p class="eyebrow">Edit Content</p>
          <h2 id="adminEditTitle">登録内容を編集</h2>
        </div>
        <button id="adminEditClose" class="admin-dialog-close" type="button" aria-label="閉じる">×</button>
      </div>
      <div id="adminEditFields" class="admin-edit-fields"></div>
      <div class="admin-dialog-actions">
        <button id="adminEditCancel" class="admin-button secondary" type="button">やめる</button>
        <button id="adminEditSave" class="admin-button primary" type="submit">更新する</button>
      </div>
      <p id="adminEditMessage" class="admin-status" role="status"></p>
    </form>
  </dialog>

  <footer><div class="wrap">VIC - VTuber Introduction Center -</div></footer>
  <script src="config.js"></script>
  <script src="admin.js?v=20260722-vic-public-edit2"></script>
</body>
</html>
